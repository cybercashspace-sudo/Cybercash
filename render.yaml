services:
  - type: web
    name: cybercash-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./cybercash.db
      - key: SYNC_DATABASE_URL
        value: sqlite:///./cybercash.db
