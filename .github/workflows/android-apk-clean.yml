name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache Buildozer downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'build_apk_ci.sh') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Ubuntu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git rsync zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 cmake libffi-dev libssl-dev \
            ccache

      - name: Build debug APK
        env:
          KIVY_API_URL: https://cybercash.space
          CYBERCASH_API_URL: https://cybercash.space
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: bash ./build_apk_ci.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cybercash-android-apk
          path: |
            bin/*.apk
            bin/*.aab
          if-no-files-found: error

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cybercash-build-logs
          path: |
            buildozer.log
            .buildozer/**/*.log
          if-no-files-found: ignore
